<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>NBA ID Card Portal</title>
<script>
// GitHub Pages SPA redirect: encode path into query param, redirect to index.html
// pathSegmentsToKeep=0 (custom domain, no repo sub-path)
var l=window.location;
l.replace(
  l.protocol+'//'+l.hostname+(l.port?':'+l.port:'')+
  l.pathname.split('/').slice(0,1).join('/')+
  '/?/'+l.pathname.slice(1).replace(/&/g,'~and~')+
  (l.search?'&'+l.search.slice(1).replace(/&/g,'~and~'):'')+
  l.hash
);
</script>
</head>
<body></body>
</html>
