steps:
  # 1. Run tests
  - name: python:3.12-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q libmagic1 libjpeg-dev libpng-dev
        pip install --quiet -r requirements.txt
        pytest tests/ -v --tb=short

  # 2. Build Docker image (tagged with commit SHA and 'latest')
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [test]
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/nba-prod-eu/backend:$SHORT_SHA
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/nba-prod-eu/backend:latest
      - .

  # 3. Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/nba-prod-eu/backend

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - nba-prod-eu
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/nba-prod-eu/backend:$SHORT_SHA
      - --region=europe-west1
      - --platform=managed
      - --cpu=2
      - --memory=1Gi
      - --concurrency=80
      - --timeout=60
      - --max-instances=10
      - --add-cloudsql-instances=$PROJECT_ID:europe-west1:${_CLOUD_SQL_INSTANCE_NAME}
      - --vpc-connector=nba-vpc-connector
      - --vpc-egress=private-ranges-only
      - --set-env-vars=ENVIRONMENT=production,DB_NAME=postgres,DB_USER=postgres,GCS_BUCKET=nba-member-assets,PUBLIC_BASE_URL=https://api.nba.alphacards.dev,FRONTEND_ORIGIN=https://nba.alphacards.dev,SMTP_HOST=smtp.resend.com,SMTP_PORT=587,SMTP_FROM=noreply@nba.alphacards.dev,CLOUD_SQL_INSTANCE=$PROJECT_ID:europe-west1:${_CLOUD_SQL_INSTANCE_NAME},BYPASS_PAYMENT=false,MEMBERSHIP_FEE_KOBO=500000
      - --set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,PAYSTACK_SECRET_KEY=PAYSTACK_SECRET_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
      - --quiet

  # 5. Smoke test — confirm /v1/healthz returns 200
  - name: curlimages/curl
    id: smoke-test
    waitFor: [deploy]
    args:
      - curl
      - --fail
      - --silent
      - --show-error
      - --max-time
      - "15"
      - https://nba-prod-eu-${_CLOUD_RUN_HASH}.europe-west1.run.app/v1/healthz

substitutions:
  _CLOUD_SQL_INSTANCE_NAME: ""    # Set in Cloud Build trigger — your Cloud SQL instance name (e.g. nba-postgres)
  _CLOUD_RUN_HASH: ""             # Set in Cloud Build trigger — hash from your Cloud Run URL

options:
  logging: CLOUD_LOGGING_ONLY
