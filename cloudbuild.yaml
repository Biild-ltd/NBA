steps:
  # 1. Run tests
  - name: python:3.12-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update -q && apt-get install -y -q libmagic1 libjpeg-dev libpng-dev
        pip install --quiet -r requirements.txt
        pytest tests/ -v --tb=short

  # 2. Build Docker image (tagged with commit SHA and 'latest')
  - name: gcr.io/cloud-builders/docker
    id: build
    waitFor: [test]
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/nba/backend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/nba/backend:latest
      - .

  # 3. Push image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/nba/backend

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    args:
      - gcloud
      - run
      - deploy
      - nba-backend
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/nba/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet

  # 5. Smoke test — confirm /v1/healthz returns 200
  - name: curlimages/curl
    id: smoke-test
    waitFor: [deploy]
    args:
      - curl
      - --fail
      - --silent
      - --show-error
      - --max-time
      - "15"
      - https://nba-backend-${_CLOUD_RUN_HASH}.${_REGION}.run.app/v1/healthz

substitutions:
  _REGION: africa-south1
  _CLOUD_RUN_HASH: ""   # Set this in Cloud Build trigger to your Cloud Run URL hash

options:
  logging: CLOUD_LOGGING_ONLY
